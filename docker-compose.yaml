version: '3.8'
services:
  # Hlavní databáze
  primary-db:
    image: postgres:15
    container_name: primary-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scaling_test
    ports:
      - "5432:5432"
    networks:
      - sql-test-net
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d # Automaticky spustí SQL skripty
    deploy:
      resources:
        limits:
          cpus: '0.5' # Omezení výkonu pro simulaci zátěže
          memory: 512M

  # Administrační rozhraní pro prohlížení dat (volitelné)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    networks:
      - sql-test-net

  # Monitoring - Postgres Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@primary-db:5432/scaling_test?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - sql-test-net
    depends_on:
      - primary-db

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - sql-test-net

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - sql-test-net
    depends_on:
      - prometheus

networks:
  sql-test-net:
    driver: bridge
